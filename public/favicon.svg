<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="flame" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>
  <!-- Rocket body -->
  <path d="M32 12 C32 12, 22 22, 22 34 C22 40, 26 44, 32 44 C38 44, 42 40, 42 34 C42 22, 32 12, 32 12Z" fill="white"/>
  <!-- Rocket window -->
  <circle cx="32" cy="28" r="4" fill="#6366f1"/>
  <!-- Left fin -->
  <path d="M22 36 L16 42 L22 40Z" fill="white" opacity="0.9"/>
  <!-- Right fin -->
  <path d="M42 36 L48 42 L42 40Z" fill="white" opacity="0.9"/>
  <!-- Flame -->
  <path d="M28 44 Q30 52, 32 54 Q34 52, 36 44" fill="url(#flame)"/>
  <!-- Document lines on rocket body -->
  <line x1="28" y1="33" x2="36" y2="33" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="29" y1="36" x2="35" y2="36" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="30" y1="39" x2="34" y2="39" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
</svg>
